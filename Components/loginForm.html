<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Mood-Based To-Do App</title>
    <link rel="stylesheet" href="../Styles/loginForm.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>
  <body>

    <!-- ── Login Card ── -->
    <div class="login-card">

      <!-- Close button -->
      <button class="login-card__close" aria-label="Close">&#x2715;</button>

      <!-- Logo -->
      <div class="login-logo-strip">
        <div class="login-logo">
          <div class="login-logo-inner"></div>
        </div>
      </div>

      <!-- Heading -->
      <h1 class="login-card__heading">Welcome Back!</h1>
      <p class="login-card__subheading">Please enter your details to login</p>

      <!-- Form -->
      <form class="login-form" onsubmit="return false;" novalidate>

        <input
          type="text"
          class="form-control"
          id="loginName"
          name="name"
          placeholder="Name"
          autocomplete="name"
          required
        />

        <input
          type="email"
          class="form-control"
          id="loginEmail"
          name="email"
          placeholder="Email"
          autocomplete="email"
          required
        />

        <input
          type="password"
          class="form-control"
          id="loginPassword"
          name="password"
          placeholder="Password"
          autocomplete="current-password"
          required
        />

        <button type="submit" class="btn-login">Login</button>

      </form>

      <!-- Footer -->
      <div class="login-divider"><span>or</span></div>
      <p class="login-footer">
        Don&apos;t have an account? <a href="#">Sign up</a>
      </p>

    </div>

  </body>
</html>
