<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suggested Task Component – Mood-Based To-Do App</title>
    <link rel="stylesheet" href="../Styles/suggestedTaskComponent.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>
  <body>

    <div class="preview-wrapper">
      <p class="preview-label">Suggested Task Component</p>

      <!-- ── Suggested Card: Mood Based ── -->
      <div class="suggested-card">
        <div class="suggested-card__top">
          <div class="suggested-card__info">
            <div class="suggested-card__name">Read a Book</div>
            <div class="suggested-card__duration">45 mins</div>
            <div class="suggested-card__time">12:43 <span class="period">PM</span></div>
          </div>
          <span class="suggested-card__icon mood">😐</span>
        </div>
        <div class="suggested-card__tag">
          <span class="suggested-card__tag-label">Based on</span>
          <span class="suggested-card__tag-value mood">Mood</span>
        </div>
        <span class="suggested-card__check">
          <i class="fa-regular fa-circle-check"></i>
        </span>
      </div>

      <!-- ── Suggested Card: Weather Based ── -->
      <div class="suggested-card" style="margin-top: 16px;">
        <div class="suggested-card__top">
          <div class="suggested-card__info">
            <div class="suggested-card__name">Meditation</div>
            <div class="suggested-card__duration">15 mins</div>
            <div class="suggested-card__time">12:43 <span class="period">PM</span></div>
          </div>
          <span class="suggested-card__icon weather">
            <i class="fa-solid fa-cloud"></i>
          </span>
        </div>
        <div class="suggested-card__tag">
          <span class="suggested-card__tag-label">Based on</span>
          <span class="suggested-card__tag-value weather">Weather - Mostly Cloudy</span>
        </div>
        <span class="suggested-card__check">
          <i class="fa-regular fa-circle-check"></i>
        </span>
      </div>
    </div>

  </body>
</html>
