<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Creation Form – Mood-Based To-Do App</title>
    <link rel="stylesheet" href="../Styles/taskCreationForm.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>
  <body>

    <!-- Modal backdrop for visual context -->
    <div class="modal-backdrop">
      <div class="task-form-modal">

        <!-- Header -->
        <div class="task-form-modal__header">
          <h2 class="task-form-modal__title">Add a new task</h2>
          <button class="task-form-modal__close" aria-label="Close">&#x2715;</button>
        </div>

        <!-- Form -->
        <form class="task-form" onsubmit="return false;">

          <!-- Task Title -->
          <div class="form-group">
            <label for="taskTitle">Task Title</label>
            <input
              type="text"
              id="taskTitle"
              class="form-control"
              placeholder="Task name"
              required
            />
          </div>

          <!-- Task Description -->
          <div class="form-group">
            <label for="taskDesc">Task Description</label>
            <textarea
              id="taskDesc"
              class="form-control"
              placeholder="Describe your task (optional)"
            ></textarea>
          </div>

          <!-- Duration + Due Date -->
          <div class="form-row">
            <div class="form-group">
              <label for="taskDuration">Duration (mins)</label>
              <input
                type="number"
                id="taskDuration"
                class="form-control"
                placeholder="e.g. 30"
                min="1"
              />
            </div>
            <div class="form-group">
              <label for="taskDate">Due Date</label>
              <input
                type="date"
                id="taskDate"
                class="form-control"
              />
            </div>
          </div>

          <!-- Time -->
          <div class="form-group">
            <label for="taskTime">Time</label>
            <input
              type="time"
              id="taskTime"
              class="form-control"
            />
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-create-task">Create Task</button>

        </form>
      </div>
    </div>

  </body>
</html>
