<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mood Selector – Mood-Based To-Do App</title>
    <link rel="stylesheet" href="../Styles/moodSelecter.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>
  <body>

    <!-- ── Mood Selector Modal ── -->
    <div class="mood-modal">

      <!-- Header -->
      <div class="mood-modal__header">
        <h2 class="mood-modal__title">How are you feeling?</h2>
        <button class="mood-modal__close" aria-label="Close">&#x2715;</button>
      </div>

      <!-- Mood emoji icons (top row) -->
      <div class="mood-icons">
        <span class="mood-icon" title="Sad" data-mood="Sad">☹</span>
        <span class="mood-icon active" title="Neutral" data-mood="Neutral">😐</span>
        <span class="mood-icon" title="Happy" data-mood="Happy">☺</span>
      </div>

      <!-- Slider -->
      <div class="mood-slider-wrapper">
        <input
          type="range"
          class="mood-slider"
          id="moodSlider"
          min="0"
          max="100"
          value="50"
          aria-label="Mood intensity"
        />
      </div>

      <!-- Button group: mood options -->
      <div class="mood-btn-group">
        <button class="mood-btn" data-mood="Sad">☹ Sad</button>
        <button class="mood-btn selected" data-mood="Neutral">😐 Neutral</button>
        <button class="mood-btn" data-mood="Happy">☺ Happy</button>
      </div>

      <!-- Confirm button -->
      <button class="btn-set-mood" id="setMoodBtn">Set Mood</button>

      <!-- Current mood label -->
      <p class="mood-label">Current mood: <span class="mood-value" id="moodValue">Neutral</span></p>

    </div>

    <script>
      // ── Mood button group interaction ──
      const moodBtns = document.querySelectorAll('.mood-btn');
      const moodIcons = document.querySelectorAll('.mood-icon');
      const moodValueEl = document.getElementById('moodValue');
      const slider = document.getElementById('moodSlider');

      const moodMap = { 'Sad': 0, 'Neutral': 50, 'Happy': 100 };
      const emojiMap = { 'Sad': '☹', 'Neutral': '😐', 'Happy': '☺' };

      function setMood(mood) {
        moodBtns.forEach(b => {
          b.classList.toggle('selected', b.dataset.mood === mood);
        });
        moodIcons.forEach(ic => {
          ic.classList.toggle('active', ic.dataset.mood === mood);
        });
        moodValueEl.textContent = mood;
        slider.value = moodMap[mood];
        updateSliderFill();
      }

      function updateSliderFill() {
        const val = slider.value;
        slider.style.background =
          `linear-gradient(to right, var(--accent) ${val}%, var(--bg-tertiary) ${val}%)`;
      }

      moodBtns.forEach(btn => {
        btn.addEventListener('click', () => setMood(btn.dataset.mood));
      });

      moodIcons.forEach(ic => {
        ic.addEventListener('click', () => setMood(ic.dataset.mood));
      });

      slider.addEventListener('input', () => {
        updateSliderFill();
        const val = parseInt(slider.value);
        let mood = 'Neutral';
        if (val < 35) mood = 'Sad';
        else if (val > 65) mood = 'Happy';
        setMood(mood);
      });

      document.getElementById('setMoodBtn').addEventListener('click', () => {
        alert(`Mood set to: ${moodValueEl.textContent}`);
      });

      // Initialise fill
      updateSliderFill();
    </script>
  </body>
</html>
