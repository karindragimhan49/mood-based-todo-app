<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mood-Based To-Do App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Styles/index.css" />
    <link rel="stylesheet" href="Styles/tasksComponent.css" />
    <link rel="stylesheet" href="Styles/suggestedTaskComponent.css" />
  </head>
  <body>
    <div class="app-wrapper">

      <!-- ===== TOP NAVBAR ===== -->
      <header class="navbar">
        <div class="navbar__left">
          <div class="navbar__avatar">
            <span class="avatar__inner"></span>
          </div>
          <div class="navbar__greeting">
            <h2 class="navbar__name">Welcome</h2>
            <p class="navbar__role">Guest.</p>
          </div>
        </div>

        <div class="navbar__right">
          <button class="mood-pill" aria-label="Current mood: Neutral">
            <span class="mood-pill__emoji">😐</span>
            <span class="mood-pill__label">Mood:</span>
          </button>
          <button class="icon-btn" aria-label="Notifications">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
          </button>
          <button class="icon-btn" aria-label="Profile">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- ===== MAIN GRID ===== -->
      <main class="dashboard-grid">

        <!-- ===== LEFT COLUMN ===== -->
        <section class="col-left">
          <div class="tasks-card">

            <!-- Card Header -->
            <div class="tasks-card__header">
              <div class="tasks-card__titles">
                <h1 class="tasks-card__title">Ready for Today?</h1>
                <p class="tasks-card__subtitle">You have 3 tasks planned for today</p>
              </div>
              <div class="tasks-card__actions">
                <button class="btn btn--outline">
                  <span class="btn__icon">+</span> Add Task
                </button>
                <button class="btn btn--solid">Complete All</button>
                <button class="btn btn--solid">Show Completed</button>
              </div>
            </div>

            <!-- Task Cards Grid -->
            <div class="task-grid">

              <!-- Task 1 -->
              <div class="task-card">
                <div class="task-card__top">
                  <span class="task-card__title">Run!</span>
                  <span class="task-card__check" aria-label="Mark complete">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                      fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                      <polyline points="20 6 9 17 4 12"/>
                    </svg>
                  </span>
                </div>
                <p class="task-card__duration">4 mins</p>
                <p class="task-card__time">1:21 PM</p>
              </div>

              <!-- Task 2 -->
              <div class="task-card">
                <div class="task-card__top">
                  <span class="task-card__title">Don't Run</span>
                  <span class="task-card__check" aria-label="Mark complete">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                      fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                      <polyline points="20 6 9 17 4 12"/>
                    </svg>
                  </span>
                </div>
                <p class="task-card__duration">34 mins</p>
                <p class="task-card__time">12:34 AM</p>
              </div>

              <!-- Task 3 -->
              <div class="task-card">
                <div class="task-card__top">
                  <span class="task-card__title">Bake Brownies</span>
                  <span class="task-card__check" aria-label="Mark complete">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                      fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                      <polyline points="20 6 9 17 4 12"/>
                    </svg>
                  </span>
                </div>
                <p class="task-card__duration">809 mins</p>
                <p class="task-card__time">12:09 PM</p>
              </div>

            </div>
            <!-- end .task-grid -->

          </div>
          <!-- end .tasks-card -->
        </section>
        <!-- end .col-left -->

        <!-- ===== RIGHT COLUMN ===== -->
        <aside class="col-right">
          <div class="suggested-card">

            <h2 class="suggested-card__title">Suggested tasks</h2>

            <!-- Suggestion 1 -->
            <div class="suggestion-item">
              <div class="suggestion-item__body">
                <div class="suggestion-item__icon suggestion-item__icon--mood" aria-label="Mood icon">
                  <span>😐</span>
                </div>
                <div class="suggestion-item__info">
                  <h3 class="suggestion-item__name">Read a Book</h3>
                  <p class="suggestion-item__duration">45 mins</p>
                  <p class="suggestion-item__time">12:43 PM</p>
                </div>
                <div class="suggestion-item__meta">
                  <span class="suggestion-item__based">Based on</span>
                  <span class="suggestion-item__keyword suggestion-item__keyword--mood">Mood</span>
                  <span class="suggestion-item__check" aria-label="Accept suggestion">
                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                      fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                      <polyline points="20 6 9 17 4 12"/>
                    </svg>
                  </span>
                </div>
              </div>
            </div>

            <!-- Suggestion 2 -->
            <div class="suggestion-item">
              <div class="suggestion-item__body">
                <div class="suggestion-item__icon suggestion-item__icon--weather" aria-label="Weather icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
                  </svg>
                </div>
                <div class="suggestion-item__info">
                  <h3 class="suggestion-item__name">Meditation</h3>
                  <p class="suggestion-item__duration">15 mins</p>
                  <p class="suggestion-item__time">12:43 PM</p>
                </div>
                <div class="suggestion-item__meta">
                  <span class="suggestion-item__based">Based on</span>
                  <span class="suggestion-item__keyword suggestion-item__keyword--weather">Weather - Mostly Cloudy</span>
                  <span class="suggestion-item__check" aria-label="Accept suggestion">
                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                      fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                      <polyline points="20 6 9 17 4 12"/>
                    </svg>
                  </span>
                </div>
              </div>
            </div>

          </div>
          <!-- end .suggested-card -->
        </aside>
        <!-- end .col-right -->

      </main>
      <!-- end .dashboard-grid -->

    </div>
    <!-- end .app-wrapper -->
  </body>
</html>
