<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suggested Task Component — Mood-Based To-Do App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../Styles/index.css" />
    <link rel="stylesheet" href="../Styles/suggestedTaskComponent.css" />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(145deg, #0a0e16 0%, #0e1420 40%, #111827 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--space-6);
      }

      .component-demo {
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        gap: var(--space-4);
      }

      .component-demo__label {
        font-size: var(--font-size-xs);
        color: var(--color-text-muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="component-demo">

      <span class="component-demo__label">Suggested Task Component</span>

      <!-- ── Suggestion Card: Mood-Based ── -->
      <div class="suggestion-item">
        <div class="suggestion-item__body">

          <!-- Icon -->
          <div class="suggestion-item__icon suggestion-item__icon--mood" aria-label="Mood icon">
            <span>😊</span>
          </div>

          <!-- Info -->
          <div class="suggestion-item__info">
            <h3 class="suggestion-item__name">Read a Book</h3>
            <p class="suggestion-item__duration">45 mins</p>
            <p class="suggestion-item__time">12:43 PM</p>
          </div>

          <!-- Meta -->
          <div class="suggestion-item__meta">
            <span class="suggestion-item__based">Based on</span>
            <span class="suggestion-item__keyword suggestion-item__keyword--mood">Mood</span>
            <span class="suggestion-item__check" aria-label="Accept suggestion">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </span>
          </div>

        </div>
      </div>

      <!-- ── Suggestion Card: Weather-Based ── -->
      <div class="suggestion-item">
        <div class="suggestion-item__body">

          <!-- Icon: Cloud -->
          <div class="suggestion-item__icon suggestion-item__icon--weather" aria-label="Weather icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
            </svg>
          </div>

          <!-- Info -->
          <div class="suggestion-item__info">
            <h3 class="suggestion-item__name">Meditation</h3>
            <p class="suggestion-item__duration">15 mins</p>
            <p class="suggestion-item__time">12:43 PM</p>
          </div>

          <!-- Meta -->
          <div class="suggestion-item__meta">
            <span class="suggestion-item__based">Based on</span>
            <span class="suggestion-item__keyword suggestion-item__keyword--weather">Weather - Mostly Cloudy</span>
            <span class="suggestion-item__check" aria-label="Accept suggestion">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </span>
          </div>

        </div>
      </div>

      <!-- ── Suggestion Card: Activity-Based ── -->
      <div class="suggestion-item">
        <div class="suggestion-item__body">

          <!-- Icon: Sun -->
          <div class="suggestion-item__icon suggestion-item__icon--weather" aria-label="Activity icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </div>

          <!-- Info -->
          <div class="suggestion-item__info">
            <h3 class="suggestion-item__name">Morning Walk</h3>
            <p class="suggestion-item__duration">30 mins</p>
            <p class="suggestion-item__time">8:00 AM</p>
          </div>

          <!-- Meta -->
          <div class="suggestion-item__meta">
            <span class="suggestion-item__based">Based on</span>
            <span class="suggestion-item__keyword suggestion-item__keyword--weather">Weather - Sunny</span>
            <span class="suggestion-item__check" aria-label="Accept suggestion">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </span>
          </div>

        </div>
      </div>

    </div>
    <!-- end .component-demo -->
  </body>
</html>
