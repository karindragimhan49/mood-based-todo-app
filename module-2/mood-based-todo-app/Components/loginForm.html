<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Mood-Based To-Do App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../Styles/index.css" />
    <link rel="stylesheet" href="../Styles/loginForm.css" />
  </head>
  <body>

    <!-- ═════ MODAL OVERLAY ═════ -->
    <div class="modal-overlay" id="loginModal" role="dialog" aria-modal="true" aria-labelledby="loginTitle">

      <!-- Login Form Card -->
      <div class="login-form-card">

        <!-- Close Button -->
        <button class="login-form-card__close" type="button" aria-label="Close login modal">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>

        <!-- Form Header -->
        <div class="login-form__header">
          <h1 class="login-form__title" id="loginTitle">Welcome Back !</h1>
          <p class="login-form__subtitle">Sign in to continue to your dashboard.</p>
        </div>

        <!-- Form Fields -->
        <form class="login-form__fields" novalidate>

          <!-- Name Field -->
          <div class="login-form__group">
            <label for="login-name" class="login-form__label">Name</label>
            <div class="login-form__input-wrapper">
              <input
                type="text"
                id="login-name"
                name="name"
                class="login-form__input"
                placeholder="Your full name"
                autocomplete="name"
              />
              <span class="login-form__input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
            </div>
          </div>

          <!-- Email Field -->
          <div class="login-form__group">
            <label for="login-email" class="login-form__label">Email</label>
            <div class="login-form__input-wrapper">
              <input
                type="email"
                id="login-email"
                name="email"
                class="login-form__input"
                placeholder="you@example.com"
                autocomplete="email"
              />
              <span class="login-form__input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                  <polyline points="22,6 12,13 2,6"/>
                </svg>
              </span>
            </div>
          </div>

          <!-- Password Field -->
          <div class="login-form__group">
            <label for="login-password" class="login-form__label">Password</label>
            <div class="login-form__input-wrapper">
              <input
                type="password"
                id="login-password"
                name="password"
                class="login-form__input"
                placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"
                autocomplete="current-password"
              />
              <span class="login-form__input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
            </div>
            <div class="login-form__forgot-row">
              <span class="login-form__forgot-link">Forgot password?</span>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" class="login-form__submit">Login</button>

        </form>
        <!-- end .login-form__fields -->

        <!-- Footer -->
        <div class="login-footer">
          <p class="login-footer__text">
            Don't have an account?
            <span class="login-footer__link">Create one free</span>
          </p>
        </div>

      </div>
      <!-- end .login-form-card -->

    </div>
    <!-- end .modal-overlay -->
  </body>
</html>
