<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Component — Mood-Based To-Do App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../Styles/index.css" />
    <link rel="stylesheet" href="../Styles/tasksComponent.css" />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(145deg, #0a0e16 0%, #0e1420 40%, #111827 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--space-6);
      }

      .component-demo {
        width: 100%;
        max-width: 480px;
        display: flex;
        flex-direction: column;
        gap: var(--space-5);
      }

      .component-demo__label {
        font-size: var(--font-size-xs);
        color: var(--color-text-muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 600;
      }

      /* Grid of 2 columns to showcase cards side-by-side */
      .component-demo__grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-4);
      }

      @media (max-width: 500px) {
        .component-demo__grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="component-demo">

      <span class="component-demo__label">Task Component — card preview</span>

      <div class="component-demo__grid">

        <!-- ── Task Card 1 ── -->
        <div class="task-card">
          <div class="task-card__top">
            <span class="task-card__title">Run!</span>
            <span class="task-card__check" aria-label="Mark complete">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </span>
          </div>
          <p class="task-card__duration">4 mins</p>
          <p class="task-card__time">1:21 PM</p>
        </div>

        <!-- ── Task Card 2 ── -->
        <div class="task-card">
          <div class="task-card__top">
            <span class="task-card__title">Don't Run</span>
            <span class="task-card__check" aria-label="Mark complete">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </span>
          </div>
          <p class="task-card__duration">34 mins</p>
          <p class="task-card__time">12:34 AM</p>
        </div>

        <!-- ── Task Card 3 ── -->
        <div class="task-card">
          <div class="task-card__top">
            <span class="task-card__title">Bake Brownies</span>
            <span class="task-card__check" aria-label="Mark complete">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </span>
          </div>
          <p class="task-card__duration">809 mins</p>
          <p class="task-card__time">12:09 PM</p>
        </div>

        <!-- ── Task Card 4 (completed state) ── -->
        <div class="task-card task-card--done">
          <div class="task-card__top">
            <span class="task-card__title">Morning Pages</span>
            <span class="task-card__check task-card__check--done" aria-label="Completed">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </span>
          </div>
          <p class="task-card__duration">20 mins</p>
          <p class="task-card__time">7:00 AM</p>
        </div>

      </div>
      <!-- end .component-demo__grid -->

    </div>
    <!-- end .component-demo -->
  </body>
</html>
